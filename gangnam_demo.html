<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Itko — 강남·강동 아이돌 성지 (데모)</title>
<style>
:root{--pri:#F47B20;--prid:#C75E0C;--pri50:#FDEAD6;--idol:#8B5CF6;--idol50:#F1ECFD;--idold:#6D40D9;--ink:#1A1A1A;--gray:#7C7A73;--line:#ECE9E2;--paper:#fff;--bg:#F7F5F0;--teal:#178A6E;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;--serif:Georgia,serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--sans);background:#E9E7E0;color:var(--ink);display:flex;justify-content:center;padding:18px;}
#app{width:min(390px,100vw);height:min(844px,100dvh);background:var(--bg);border-radius:30px;box-shadow:0 18px 60px rgba(0,0,0,.22);overflow:hidden;position:relative;display:flex;flex-direction:column;}
@media (max-width:440px),(max-height:900px){body{padding:0;}#app{border-radius:0;box-shadow:none;height:100dvh;}}
.cbadge{position:absolute;top:0;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:10px;font-weight:800;padding:3px 12px;border-radius:0 0 10px 10px;z-index:60;}
.top{background:var(--paper);padding:12px 16px 9px;flex:0 0 auto;border-bottom:1px solid var(--line);}
.tr{display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:20px;font-weight:800;color:var(--pri);letter-spacing:-.02em;}.logo span{color:var(--ink);}
.srch{width:30px;height:30px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:15px;}
.area{display:flex;align-items:center;gap:5px;margin-top:9px;font-size:13.5px;font-weight:800;}.area .pin{color:var(--pri);font-size:11px;}.area .ch{font-size:10px;color:var(--gray);}
.filters{display:flex;gap:7px;padding:10px 16px 4px;overflow-x:auto;flex:0 0 auto;}.filters::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;padding:7px 13px;border-radius:20px;font-size:12.5px;font-weight:800;background:var(--paper);border:1.5px solid var(--line);color:var(--ink);cursor:pointer;white-space:nowrap;}
.chip.on{background:var(--idol);border-color:var(--idol);color:#fff;}
.body{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;padding-bottom:78px;}.body::-webkit-scrollbar{display:none;}
.tabpane{display:none;}.tabpane.on{display:block;}
.hype{margin:14px 16px 2px;border-radius:16px;overflow:hidden;position:relative;height:128px;background-size:cover;background-position:center;box-shadow:0 4px 14px rgba(0,0,0,.12);}
.hype .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.72));}
.hype .tag{position:absolute;top:10px;left:10px;background:var(--idol);color:#fff;font-size:10px;font-weight:800;padding:4px 9px;border-radius:14px;}
.hype .cap{position:absolute;left:13px;right:13px;bottom:11px;color:#fff;}.hype .cap .h{font-size:17px;font-weight:800;}.hype .cap .s{font-size:11.5px;color:#eee;margin-top:2px;}
.sech{display:flex;align-items:baseline;justify-content:space-between;padding:16px 16px 9px;}
.sech .t{font-size:16px;font-weight:800;display:flex;align-items:center;gap:6px;}.sech .t .em{color:var(--idol);}.sech .more{font-size:11.5px;font-weight:700;color:var(--gray);}
.hero{display:flex;gap:11px;overflow-x:auto;padding:0 16px 4px;}.hero::-webkit-scrollbar{display:none;}
.hcard{flex:0 0 168px;background:var(--paper);border-radius:15px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.06);cursor:pointer;}
.hph{position:relative;height:110px;background-size:cover;background-position:center;}
.hbadge{position:absolute;top:8px;left:8px;display:flex;align-items:center;gap:5px;background:rgba(139,92,246,.95);color:#fff;font-size:10px;font-weight:800;padding:3px 8px;border-radius:14px;max-width:150px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.hcnt{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;font-weight:800;padding:3px 7px;border-radius:12px;}
.hheart{position:absolute;bottom:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.35);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;}.hheart.sv{background:#fff;color:var(--pri);}
.hb{padding:9px 10px 11px;}.hn{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.hsub{font-size:11px;color:var(--gray);margin-top:2px;}
.list{padding:0 16px;display:flex;flex-direction:column;gap:11px;}
.lcard{background:var(--paper);border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.045);display:flex;cursor:pointer;}
.lph{flex:0 0 92px;height:92px;background-size:cover;background-position:center;position:relative;margin:9px 0 9px 9px;border-radius:11px;}
.lheart{position:absolute;top:6px;right:6px;width:25px;height:25px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;font-size:13px;}.lheart.sv{color:var(--pri);}
.lb{flex:1;padding:10px 12px;min-width:0;display:flex;flex-direction:column;justify-content:center;}
.kick{font-size:9.5px;font-weight:800;letter-spacing:.04em;color:var(--idold);display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ln{font-size:15px;font-weight:800;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lsub{font-size:11.5px;color:var(--gray);margin-top:3px;}
.strong{display:inline-block;font-size:9px;font-weight:800;padding:1px 6px;border-radius:9px;margin-left:5px;}
.s-강{background:var(--idol50);color:var(--idold);}.s-중{background:#EFEDE6;color:#8a8676;}
/* map */
.maparea{position:relative;height:340px;background:repeating-linear-gradient(0deg,transparent 0 38px,rgba(0,0,0,.035) 38px 40px),repeating-linear-gradient(90deg,transparent 0 38px,rgba(0,0,0,.035) 38px 40px),linear-gradient(160deg,#EAF1EC,#E5EBF2);overflow:hidden;}
.mpin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;}
.mpin .dot{width:26px;height:26px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);background:var(--idol);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.25);border:2px solid #fff;}
.mpin .dot span{transform:rotate(-45deg);font-size:11px;}
.mapnote{position:absolute;top:12px;left:12px;background:#fff;border-radius:18px;padding:7px 12px;font-size:11px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.12);color:var(--gray);}
.empty{text-align:center;color:var(--gray);font-size:13px;padding:80px 30px;}.empty .ic{font-size:46px;}
.dock{position:absolute;bottom:0;left:0;right:0;background:var(--paper);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom));flex:0 0 auto;z-index:30;}
.dk{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9.5px;font-weight:700;color:#BAB7AF;cursor:pointer;position:relative;}.dk.on{color:var(--pri);}.dk .ic{font-size:19px;}
.dk .bdg{position:absolute;top:-4px;right:50%;transform:translateX(15px);background:var(--pri);color:#fff;font-size:9px;font-weight:800;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.scrim{position:absolute;inset:0;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.2s;z-index:40;}.scrim.on{opacity:1;pointer-events:auto;}
.sheet{position:absolute;left:0;right:0;bottom:0;max-height:92%;background:var(--paper);border-radius:22px 22px 0 0;transform:translateY(100%);transition:.28s cubic-bezier(.3,.8,.3,1);z-index:41;overflow-y:auto;}.sheet.on{transform:translateY(0);}.sheet::-webkit-scrollbar{display:none;}
.dph{height:188px;background-size:cover;background-position:center;position:relative;}.dph .note{position:absolute;bottom:8px;left:10px;background:rgba(0,0,0,.5);color:#fff;font-size:9.5px;padding:2px 7px;border-radius:10px;}
.dclose{position:absolute;top:11px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.4);color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;}
.dbody{padding:15px 17px 22px;}.dname{font-size:21px;font-weight:800;}.dmeta{font-size:12px;color:var(--gray);margin-top:4px;}
.idolsec{margin-top:15px;}.idolsec .lab{font-size:10.5px;font-weight:800;letter-spacing:.08em;color:var(--idold);margin-bottom:8px;}
.idolrow{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
.idolrow .av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;flex:0 0 auto;}
.idolrow .who{font-size:13.5px;font-weight:800;}.idolrow .src{font-size:11.5px;color:var(--gray);margin-top:2px;line-height:1.4;}
.dcta{display:flex;gap:9px;margin-top:18px;}.dcta button,.dcta a{flex:1;border:none;border-radius:12px;padding:13px;font-size:13.5px;font-weight:800;font-family:inherit;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;}
.b-save{background:var(--ink);color:#fff;}.b-save.sv{background:var(--pri50);color:var(--prid);}.b-map{background:var(--pri);color:#fff;}
.b-naver{margin-top:9px;width:100%;border:1.5px solid #03C75A;background:#fff;color:#03A64A;border-radius:12px;padding:12px;font-size:13.5px;font-weight:800;text-align:center;text-decoration:none;display:block;}
.toast{position:absolute;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:12.5px;font-weight:700;padding:10px 16px;border-radius:22px;opacity:0;transition:.25s;z-index:50;}.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">
  <div class="cbadge">실제 데이터 · DB 없는 시안 데모</div>
  <div class="top">

  <div class="scrim" id="scrim" onclick="closeAll()"></div>

</div>

var DONGS=["청담동","압구정동","논현동","신사동"];
var state={tab:'discover',filter:'all'};
var saved={};
function pic(p){return 'img/'+p;}
function avColor(s){var h=0;for(var i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);var c=['#8B5CF6','#F47B20','#178A6E','#2E6FB0','#CF3A2A','#C75E0C'];return c[Math.abs(h)%c.length];}
function filtered(){if(state.filter==='all')return DATA;if(state.filter==='강')return DATA.filter(function(s){return s.idols.some(function(i){return i.strength==='강';});});return DATA.filter(function(s){return s.dong===state.filter;});}
function heart(id,cls){return '<div class="'+cls+(saved[id]?' sv':'')+'" onclick="event.stopPropagation();toggleSave('+id+')">'+(saved[id]?'♥':'♡')+'</div>';}
function idolLabel(s){var f=s.idols[0].label;return f+(s.idols.length>1?' 외 '+(s.idols.length-1)+'명':'');}
function heroCard(s){return '<div class="hcard" onclick="openDetail('+s.id+')"><div class="hph" style="background-image:url('+pic(s.pic)+')">'+
 '<div class="hbadge">💜 '+s.idols[0].label+'</div>'+(s.idols.length>1?'<div class="hcnt">+'+(s.idols.length-1)+'</div>':'')+heart(s.id,'hheart')+'</div>'+
 '<div class="hb"><div class="hn">'+s.n+'</div><div class="hsub">'+s.foodShort+' · '+s.dong+'</div></div></div>';}
function rowCard(s){return '<div class="lcard" onclick="openDetail('+s.id+')"><div class="lph" style="background-image:url('+pic(s.pic)+')">'+heart(s.id,'lheart')+'</div>'+
 '<div class="lb"><div class="kick">💜 '+idolLabel(s)+'</div><div class="ln">'+s.n+'</div><div class="lsub">'+s.foodShort+' · '+s.dong+'</div></div></div>';}
function renderFilters(){var c=['<div class="chip '+(state.filter==='all'?'on':'')+'" onclick="setF(\'all\')">전체 '+DATA.length+'</div>',
 '<div class="chip '+(state.filter==='강'?'on':'')+'" onclick="setF(\'강\')">🔥 근거 강함</div>'];
 DONGS.forEach(function(d){c.push('<div class="chip '+(state.filter===d?'on':'')+'" onclick="setF(\''+d+'\')">'+d+'</div>');});
 document.getElementById('filters').innerHTML=c.join('');}
function renderDiscover(){var list=filtered();var hero=DATA.filter(function(s){return s.idols.length>1;}).slice(0,10);var h='';
 h+='<div class="hype" style="background-image:url('+pic('cafe.jpg')+')"><div class="ov"></div><div class="tag">💜 K-IDOL</div><div class="cap"><div class="h">강남·강동 아이돌 성지 '+DATA.length+'곳</div><div class="s">최애가 다녀간 진짜 맛집</div></div></div>';
 if(state.filter==='all'&&hero.length){h+='<div class="sech"><div class="t"><span class="em">💜</span> 여러 아이돌이 다녀간 곳</div></div><div class="hero">'+hero.map(heroCard).join('')+'</div>';}
 h+='<div class="sech"><div class="t">📍 '+(state.filter==='all'?'전체':state.filter)+' ('+list.length+'곳)</div></div>';
 h+='<div class="list">'+list.map(rowCard).join('')+'</div>';
 document.getElementById('pane-discover').innerHTML=h;}
function renderMap(){var list=filtered();var pins=list.map(function(s,i){var x=12+((i*37)%76);var y=14+((i*53)%72);return '<div class="mpin" style="left:'+x+'%;top:'+y+'%" onclick="openDetail('+s.id+')"><div class="dot"><span>💜</span></div></div>';}).join('');
 document.getElementById('pane-map').innerHTML='<div class="maparea"><div class="mapnote">📍 좌표 없음 — 검색 기반 데모</div>'+pins+'</div><div class="list" style="margin-top:14px;">'+list.map(rowCard).join('')+'</div>';}
function renderSaved(){var ids=Object.keys(saved);var list=DATA.filter(function(s){return saved[s.id];});
 if(!list.length){document.getElementById('pane-saved').innerHTML='<div class="empty"><div class="ic">🔖</div><div style="margin-top:12px;font-weight:800;color:var(--ink);">저장한 곳이 없어요</div><div style="margin-top:6px;">♡ 를 눌러 나만의 성지 리스트를 만들어요.</div></div>';return;}
 document.getElementById('pane-saved').innerHTML='<div style="padding:14px 16px 2px;font-size:12.5px;color:var(--gray);font-weight:700;">'+list.length+'곳 저장됨</div><div class="list" style="margin-top:8px;">'+list.map(rowCard).join('')+'</div>';}
function mapsLink(s){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(s.n+' '+s.dong);}
function naverLink(s){return 'https://map.naver.com/v5/search/'+encodeURIComponent(s.n+' '+s.dong);}
function openDetail(id){var s=DATA.filter(function(x){return x.id===id;})[0];var sv=saved[id];
 var idols=s.idols.map(function(it){return '<div class="idolrow"><div class="av" style="background:'+avColor(it.label)+'">'+it.label.charAt(0)+'</div><div><div class="who">💜 '+it.label+'<span class="strong s-'+it.strength+'">근거 '+it.strength+'</span></div><div class="src">'+it.src+'</div></div></div>';}).join('');
 document.getElementById('sheet').innerHTML='<div class="dph" style="background-image:url('+pic(s.pic)+')"><div class="dclose" onclick="closeAll()">✕</div><div class="note">※ 사진은 임시 (음식 종류 예시)</div></div>'+
  '<div class="dbody"><div class="dname">'+s.n+'</div><div class="dmeta">'+s.food+' · '+s.gu+' '+s.dong+'</div>'+
  '<div class="idolsec"><div class="lab">💜 다녀간 아이돌 ('+s.idols.length+')</div>'+idols+'</div>'+
  '<div class="dcta"><button class="b-save'+(sv?' sv':'')+'" onclick="toggleSave('+id+',true)">'+(sv?'♥ 저장됨':'♡ 저장')+'</button><a class="b-map" href="'+mapsLink(s)+'" target="_blank">📍 Google 지도</a></div>'+
  '<a class="b-naver" href="'+naverLink(s)+'" target="_blank">🟢 네이버맵 길찾기</a></div>';
 document.getElementById('scrim').classList.add('on');document.getElementById('sheet').classList.add('on');}
function toggleSave(id,d){if(saved[id])delete saved[id];else saved[id]=true;toast(saved[id]?'저장됨':'삭제됨');refresh();if(d)openDetail(id);}
function closeAll(){document.getElementById('scrim').classList.remove('on');document.getElementById('sheet').classList.remove('on');}
var tt;function toast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('on');clearTimeout(tt);tt=setTimeout(function(){e.classList.remove('on');},1400);}
function renderDock(){var n=Object.keys(saved).length;var it=[['discover','🍜','탐색'],['map','🗺️','지도'],['saved','🔖','저장']];
 document.getElementById('dock').innerHTML=it.map(function(x){var b=(x[0]==='saved'&&n)?'<div class="bdg">'+n+'</div>':'';return '<div class="dk '+(state.tab===x[0]?'on':'')+'" onclick="go(\''+x[0]+'\')">'+b+'<div class="ic">'+x[1]+'</div>'+x[2]+'</div>';}).join('');}
function go(t){state.tab=t;document.querySelectorAll('.tabpane').forEach(function(p){p.classList.remove('on');});document.getElementById('pane-'+t).classList.add('on');if(t==='map')renderMap();if(t==='saved')renderSaved();renderDock();document.querySelector('.body').scrollTop=0;}
function setF(f){state.filter=f;renderFilters();renderDiscover();if(state.tab==='map')renderMap();document.querySelector('.body').scrollTop=0;}
function refresh(){renderFilters();renderDiscover();renderDock();if(state.tab==='map')renderMap();if(state.tab==='saved')renderSaved();}
renderFilters();renderDiscover();renderDock();
</script>
</body>
