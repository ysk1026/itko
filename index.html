:root{--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);background:#EDEBE4;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;}
#k2{--pri:#F47B20;--prid:#C75E0C;--pri50:#FDEAD6;--ink:#1A1A1A;--ink2:#3A3A3A;--gray:#8A8A8A;--line:rgba(0,0,0,0.10);--sand:#F0EEE8;--paper:#FBFAF7;--teal:#178A6E;--teal50:#E1F2ED;--blue:#2E6FB0;--blue50:#E7EEF7;--gold:#E8A33A;
font-family:var(--font-sans);width:min(390px,100vw);height:min(820px,100dvh);margin:0 auto;background:var(--paper);border:1px solid var(--line);border-radius:26px;overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.12);}
@media (max-width:440px),(max-height:880px){body{padding:0;}#k2{border:none;border-radius:0;box-shadow:none;}}
#k2-hdr{height:54px;flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:0 12px;border-bottom:1px solid var(--line);background:var(--paper);z-index:5;}
.k2-ttl{font-size:15px;font-weight:500;color:var(--ink);}
.k2-bk,.k2-ic{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);font-size:19px;}
.k2-bk:hover,.k2-ic:hover{background:var(--sand);}
.k2-sel{font-size:11px;font-family:inherit;border:1px solid var(--line);border-radius:8px;padding:5px 6px;background:#fff;color:var(--ink);max-width:92px;}
.k2-lang{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.k2-lang span{font-size:11px;font-weight:500;padding:4px 8px;cursor:pointer;color:var(--gray);}
.k2-lang span.on{background:var(--pri);color:#fff;}
#k2-body{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;}
#k2-tabs{height:60px;flex:0 0 auto;display:flex;border-top:1px solid var(--line);background:#fff;}
#k2-tabs .tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--gray);font-size:9.5px;position:relative;}
#k2-tabs .tb i{font-size:20px;}
#k2-tabs .tb.on{color:var(--pri);}
#k2-tabs .tb .cnt{position:absolute;top:6px;left:56%;background:var(--pri);color:#fff;font-size:9px;font-weight:500;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
.kc{cursor:pointer;}
.pill{font-size:10.5px;font-weight:500;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;}
.lbl{font-size:10px;font-weight:500;padding:2px 8px;border-radius:6px;display:inline-block;}
.kbtn{cursor:pointer;border:none;font-family:inherit;}
.ph{position:relative;background:var(--sand);overflow:hidden;}
.ph .ico{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#b8b4a8;}
.ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
.seg{display:flex;background:var(--sand);border-radius:10px;padding:3px;gap:3px;}
.seg span{flex:1;text-align:center;font-size:12px;font-weight:500;padding:7px 0;border-radius:8px;color:var(--gray);cursor:pointer;}
.seg span.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08);}
.sect{font-size:11px;font-weight:500;color:#a8a49a;letter-spacing:.04em;margin-bottom:6px;}
.kfm-pin{width:34px;height:34px;border-radius:50% 50% 50% 2px;background:var(--pri);display:flex;align-items:center;justify-content:center;color:#fff;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.av{width:32px;height:32px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#fff;}
.leaflet-container{font-family:var(--font-sans);}
.ksearch{flex:1;height:34px;border:1px solid var(--line);border-radius:10px;padding:0 10px;font-family:inherit;font-size:13px;background:#fff;color:var(--ink);}
.loc-pill{display:flex;align-items:center;gap:5px;background:var(--sand);border-radius:20px;padding:6px 11px;font-size:14px;font-weight:500;color:var(--ink);}
.loc-pill>i:first-child{color:var(--pri);font-size:15px;}
.loc-pill:active{transform:scale(0.97);}
.sheet-wrap{position:absolute;inset:0;z-index:40;display:none;}
.sheet-wrap.show{display:block;}
.sheet-bd{position:absolute;inset:0;background:rgba(0,0,0,0.42);}
.sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;padding:8px 0 20px;box-shadow:0 -4px 24px rgba(0,0,0,0.15);}
.sheet .grip{width:38px;height:4px;border-radius:2px;background:#d8d5cc;margin:6px auto 6px;}
.sheet h4{font-size:12px;color:var(--gray);font-weight:500;letter-spacing:.03em;padding:6px 20px 8px;}
.sheet-item{display:flex;align-items:center;gap:11px;padding:13px 20px;font-size:15px;color:var(--ink);cursor:pointer;}
.sheet-item.on{color:var(--pri);font-weight:500;}
.sheet-item:active{background:var(--sand);}
</style>

 {t:{en:'2AM eats crawl in Hongdae',ko:'홍대 새벽 야식 투어'},area:'hongdae',when:{en:'Fri 11:30 PM',ko:'금 23:30'},host:'Dina',n:6,cap:8,lens:'2am'},
 {t:{en:'Halal food walk — Itaewon',ko:'할랄 푸드워크 — 이태원'},area:'itaewon',when:{en:'Sat 1:00 PM',ko:'토 13:00'},host:'Yusuf',n:4,cap:6,lens:'halal'},
 {t:{en:'Seongsu cafe-hopping',ko:'성수 카페 투어'},area:'seongsu',when:{en:'Sun 11:00 AM',ko:'일 11:00'},host:'Mei',n:5,cap:6,lens:'insta'},
 {t:{en:'Chimaek & soju night',ko:'치맥·소주 나이트'},area:'gangnam',when:{en:'Sat 8:00 PM',ko:'토 20:00'},host:'Liam',n:7,cap:10,lens:'soju'}
];
var ROUTES=[
 {t:{en:'Hongdae first-timer day',ko:'홍대 첫 방문 코스'},area:'hongdae',by:'Mei',likes:128,stops:['r6','hc1','r1']},
 {t:{en:'Halal-friendly Seoul',ko:'할랄 친화 서울'},area:'itaewon',by:'Yusuf',likes:96,stops:['i1','i4','m3']},
 {t:{en:'Seongsu cafe + dinner',ko:'성수 카페+디너'},area:'seongsu',by:'Aisha',likes:74,stops:['s1','hc6','s2']},
 {t:{en:'2AM survival route',ko:'새벽 2시 생존 루트'},area:'hongdae',by:'Dina',likes:61,stops:['r3','r8','r5']}
];
var REVIEWERS=[
 {u:'Mei',revs:142,likes:5400,badge:'Gold'},{u:'Dina',revs:118,likes:4100,badge:'Gold'},
 {u:'Yusuf',revs:97,likes:3300,badge:'Silver'},{u:'Carlos',revs:64,likes:1800,badge:'Silver'},
 {u:'Aisha',revs:51,likes:1500,badge:'Bronze'}
];
var VIBES=[['foodie','Foodie',{en:'Foodie',ko:'미식'},'locals'],['trendy','Trendy',{en:'Trendy',ko:'트렌디'},'insta'],['budget','Budget',{en:'Budget',ko:'가성비'},'budget'],['halal','Halal',{en:'Halal',ko:'할랄'},'halal'],['night','Night',{en:'Night owl',ko:'밤형'},'2am']];

var L_lang='en',area='hongdae';
function T(o){return o==null?'':(typeof o==='string'?o:(o[L_lang]!=null?o[L_lang]:o.en));}

function go(v,p){stack.push({v:v,p:p});render();}
function back(){if(stack.length>1){stack.pop();render();}}
function tab(v){stack=[{v:v}];render();}
function sc(){return Object.keys(saved).length;}
function areaList(){return Object.keys(R).map(function(k){return R[k];}).filter(function(r){return r.areaId===area;});}

function catCount(id){return areaList().filter(function(r){return r.catId===id;}).length;}
function lensMeta(id){return LENS.filter(function(x){return x.id===id;})[0];}
window.kfm={go:go,back:back,tab:tab,
 save:function(id,e){if(e)e.stopPropagation();saved[id]?delete saved[id]:saved[id]=1;render();},
 setF:function(f){filter=f;render();},setLang:function(l){L_lang=l;render();},
 tStart:function(e){window._tx=(e.touches&&e.touches[0])?e.touches[0].clientX:0;window._sw=false;},
 tEnd:function(e){var x=(e.changedTouches&&e.changedTouches[0])?e.changedTouches[0].clientX:0;var dx=x-(window._tx||0);if(Math.abs(dx)>35){window._sw=true;var n=HYPE.length;hypeIdx=(hypeIdx+(dx<0?1:-1)+n)%n;render();}},
 setArea:function(a){area=a;planArea=a;stack=[{v:stack[0].v}];showAll=false;var s=document.getElementById('k2-sheet');if(s)s.classList.remove('show');render();},
 openAreas:function(){var el=document.getElementById('k2-sheet');el.innerHTML=sheetHTML();el.classList.add('show');},
 closeAreas:function(){document.getElementById('k2-sheet').classList.remove('show');},
 hype:function(i){hypeIdx=i;render();},toggleAll:function(){showAll=!showAll;render();},

 planMode:function(m){planMode=m;planRun=false;render();},

function card(id){var r=R[id],sv=saved[id];
 return '<div class="kc" onclick="kfm.go(\'detail\',\''+id+'\')" style="display:flex;gap:12px;padding:10px;background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;align-items:center;">'

function emptyNote(){return '<div style="padding:30px 16px;text-align:center;color:var(--gray);font-size:13px;">'+T(UI.none)+'</div>';}

 var shown=(showAll?LENS:LENS.filter(function(x){return x.feat;})).filter(function(le){return lensCount(le.id)>0;});

   h+='<div style="background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px;margin-bottom:10px;"><div style="display:flex;gap:11px;align-items:center;"><div style="width:42px;height:42px;border-radius:11px;flex:0 0 auto;background:'+le.c+';display:flex;align-items:center;justify-content:center;color:#fff;"><i class="ti '+le.i+'" style="font-size:20px;"></i></div><div style="flex:1;"><div style="font-size:14px;font-weight:500;color:var(--ink);">'+T(mu.t)+'</div><div style="font-size:11.5px;color:var(--gray);margin-top:2px;"><i class="ti ti-clock" style="font-size:12px;"></i> '+T(mu.when)+' · '+T(aById(mu.area).t)+'</div></div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;"><span style="font-size:11.5px;color:var(--gray);">'+(L_lang==='ko'?'호스트 ':'Host ')+mu.host+' · '+mu.n+'/'+mu.cap+'</span><span class="pill" style="background:var(--pri50);color:var(--prid);cursor:pointer;">'+(L_lang==='ko'?'참여':'Join')+'</span></div></div>';});
 }else if(commTab==='top'){
  h+='<div style="font-size:12px;color:var(--gray);margin-bottom:10px;">'+(L_lang==='ko'?'베스트 리뷰어 — 추천/조회 수 기준, 혜택 제공':'Best reviewers — by likes & views, earn perks')+'</div>';
  REVIEWERS.forEach(function(rw,i){var bc=rw.badge==='Gold'?'#E8A33A':(rw.badge==='Silver'?'#9aa0a6':'#C07B3A');
   h+='<div style="display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:11px 12px;margin-bottom:9px;"><div style="font-size:15px;font-weight:500;color:var(--gray);width:20px;">'+(i+1)+'</div><div class="av" style="background:'+avc(rw.u)+';">'+rw.u.charAt(0)+'</div><div style="flex:1;"><div style="font-size:14px;font-weight:500;color:var(--ink);">'+rw.u+'</div><div style="font-size:11.5px;color:var(--gray);">'+rw.revs+' '+(L_lang==='ko'?'리뷰':'reviews')+' · '+(rw.likes/1000).toFixed(1)+'k likes</div></div><span class="pill" style="background:'+bc+'22;color:'+bc+';">'+rw.badge+'</span></div>';});
 }
 h+='</div>';return h;
}
/* ---------- AREA SHEET ---------- */
function sheetHTML(){
 var h='<div class="sheet-bd" onclick="kfm.closeAreas()"></div><div class="sheet"><div class="grip"></div><h4>'+(L_lang==='ko'?'지역 선택':'CHOOSE AREA').toUpperCase()+'</h4>';
 AREA.forEach(function(a){var on=a.id===area;var n=Object.keys(R).map(function(k){return R[k];}).filter(function(r){return r.areaId===a.id;}).length;
  h+='<div class="sheet-item '+(on?'on':'')+'" onclick="kfm.setArea(\''+a.id+'\')"><i class="ti ti-map-pin" style="font-size:18px;'+(on?'color:var(--pri);':'color:#b8b4a8;')+'"></i><span style="flex:1;">'+T(a.t)+'</span><span style="font-size:12px;color:var(--gray);margin-right:8px;">'+n+' '+T(UI.places)+'</span>'+(on?'<i class="ti ti-check" style="font-size:18px;color:var(--pri);"></i>':'')+'</div>';});
 h+='</div>';return h;
}
/* ---------- RENDER ---------- */
function render(){
 var c=cur(),body=document.getElementById('k2-body'),hdr=document.getElementById('k2-hdr'),deep=stack.length>1;
 if(lmap){lmap.remove();lmap=null;}
 var lang='<div class="k2-lang"><span class="'+(L_lang==='en'?'on':'')+'" onclick="kfm.setLang(\'en\')">EN</span><span class="'+(L_lang==='ko'?'on':'')+'" onclick="kfm.setLang(\'ko\')">KO</span></div>';
 var locPill='<div class="loc-pill kc" onclick="kfm.openAreas()"><i class="ti ti-map-pin"></i><span>'+T(curArea().t)+'</span><i class="ti ti-chevron-down" style="font-size:13px;opacity:.55;"></i></div>';
 var searchBtn='<div class="k2-ic" onclick="kfm.go(\'search\')"><i class="ti ti-search"></i></div>';
 if(deep)hdr.innerHTML='<div class="k2-bk" onclick="kfm.back()"><i class="ti ti-chevron-left"></i></div><div style="flex:1;"></div>'+searchBtn+lang;
 else hdr.innerHTML='<i class="ti ti-tools-kitchen-2" style="color:var(--pri);font-size:20px;"></i><span class="k2-ttl" style="margin-right:2px;">'+T(UI.app)+'</span>'+locPill+'<div style="flex:1;"></div>'+searchBtn+lang;
 var v=c.v;
 if(v==='feed')body.innerHTML=feed();
 else if(v==='lens')body.innerHTML=lensView(c.p);
 else if(v==='cat')body.innerHTML=catView(c.p);
 else if(v==='hype')body.innerHTML=hypeView(c.p);
 else if(v==='map')body.innerHTML=mapView();
 else if(v==='detail')body.innerHTML=detail(c.p);
 else if(v==='saved')body.innerHTML=savedView();
 else if(v==='plan')body.innerHTML=planView();
 else if(v==='community')body.innerHTML=communityView();
 else if(v==='search')body.innerHTML=searchView();
 body.scrollTop=0;
 if(v==='map')setTimeout(initMap,30);
 if(v==='search'){var inp=document.getElementById('ksearch-in');if(inp){inp.value=searchQ;inp.focus();}}
 var rt=stack[0].v,th='';
 [['feed','ti-flame',{en:'Feed',ko:'피드'}],['map','ti-map-2',{en:'Map',ko:'지도'}],['plan','ti-compass',{en:'Plan',ko:'플랜'}],['community','ti-users',{en:'Community',ko:'커뮤니티'}],['saved','ti-bookmark',{en:'Saved',ko:'저장'}]].forEach(function(t){var on=rt===t[0];th+='<div class="tb '+(on?'on':'')+'" onclick="kfm.tab(\''+t[0]+'\')"><i class="ti '+t[1]+'"></i>'+(t[0]==='saved'&&sc()?'<span class="cnt">'+sc()+'</span>':'')+'<span>'+T(t[2])+'</span></div>';});
 document.getElementById('k2-tabs').innerHTML=th;
}
/* search header bar injected into search view */
function searchView(){
 return '<div style="padding:12px 16px;"><div style="display:flex;gap:8px;margin-bottom:14px;"><input id="ksearch-in" class="ksearch" placeholder="'+T(UI.searchPh)+'" oninput="kfm.search(this.value)"><div class="k2-ic" onclick="kfm.back()" style="border:1px solid var(--line);"><i class="ti ti-x"></i></div></div><div id="searchres">'+searchResults()+'</div></div>';
}
render();
})();
</script>
</body>
</html>
