<style>
:root{--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
--pri:#F47B20;--prid:#C75E0C;--pri50:#FDEAD6;--ink:#1A1A1A;--ink2:#3A3A3A;--gray:#8A8A8A;--line:rgba(0,0,0,0.10);--sand:#F0EEE8;--paper:#FBFAF7;--teal:#178A6E;--teal50:#E1F2ED;--blue:#2E6FB0;--blue50:#E7EEF7;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:var(--font-sans);background:var(--paper);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
header{height:60px;flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:0 22px;border-bottom:1px solid var(--line);background:var(--paper);z-index:1000;}
header .logo{display:flex;align-items:center;gap:9px;}
header .logo i{color:var(--pri);font-size:24px;}
header .logo .nm{font-size:17px;font-weight:500;}
header .logo .tg{font-size:12px;color:var(--gray);margin-left:6px;border-left:1px solid var(--line);padding-left:12px;}
.a-sel{font-size:13px;font-family:inherit;border:1px solid var(--line);border-radius:9px;padding:7px 10px;background:#fff;color:var(--ink);cursor:pointer;}
.lang{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.lang span{font-size:12px;font-weight:500;padding:6px 12px;cursor:pointer;color:var(--gray);}
.lang span.on{background:var(--pri);color:#fff;}
.fbar{flex:0 0 auto;border-bottom:1px solid var(--line);background:var(--paper);padding:10px 22px;display:flex;flex-direction:column;gap:8px;}
.frow{display:flex;align-items:center;gap:8px;overflow-x:auto;}
.frow .flbl{font-size:11px;font-weight:500;color:#a8a49a;letter-spacing:.03em;flex:0 0 auto;width:80px;}
.chip{font-size:12.5px;font-weight:500;padding:7px 13px;border-radius:20px;white-space:nowrap;cursor:pointer;border:1px solid var(--line);background:#fff;color:#555;display:inline-flex;align-items:center;gap:5px;flex:0 0 auto;}
.chip.on{background:var(--pri);color:#fff;border-color:var(--pri);}
.chip.lens.on{background:var(--ink);border-color:var(--ink);}
main{flex:1 1 auto;display:flex;min-height:0;}
.list{width:440px;flex:0 0 auto;overflow-y:auto;border-right:1px solid var(--line);padding:16px;background:var(--paper);}
.mapwrap{flex:1 1 auto;position:relative;}
#webmap{position:absolute;inset:0;background:#E9ECE4;}
.kfm-pin{width:36px;height:36px;border-radius:50% 50% 50% 2px;background:var(--pri);display:flex;align-items:center;justify-content:center;color:#fff;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.35);}
.kfm-pin.sel{background:var(--ink);transform:scale(1.12);}
.hstrip{display:flex;gap:10px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px;}
.hcard{flex:0 0 auto;width:150px;border-radius:13px;overflow:hidden;border:1px solid var(--line);background:#2A2A33;}
.hcard .ph{height:78px;}
.hcard .cap{padding:8px 9px;color:#fff;}
.pill{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;}
.ph{position:relative;background:var(--sand);overflow:hidden;}
.ph .ico{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#b8b4a8;}
.ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
.rcard{display:flex;gap:13px;padding:11px;background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:11px;align-items:center;cursor:pointer;transition:border-color .12s;}
.rcard:hover{border-color:var(--pri);}
.rcard.sel{border-color:var(--pri);box-shadow:0 0 0 1px var(--pri);}
.kbtn{cursor:pointer;border:none;font-family:inherit;}
.sect{font-size:11px;font-weight:500;color:#a8a49a;letter-spacing:.04em;margin-bottom:5px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:2000;padding:24px;}
.overlay.show{display:flex;}
.modal{width:460px;max-width:100%;max-height:88vh;overflow-y:auto;background:#fff;border-radius:18px;position:relative;}
.modal .x{position:absolute;top:12px;left:12px;z-index:3;width:38px;height:38px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2);font-size:20px;}
.leaflet-container{font-family:var(--font-sans);}
</style>
</head>
<body>
<header>
 <div class="logo"><i class="ti ti-tools-kitchen-2"></i><span class="nm" id="appnm"></span><span class="tg" id="tagline"></span></div>
 <div style="flex:1"></div>
 <select class="a-sel" id="areasel" onchange="kfm.setArea(this.value)"></select>
 <div class="lang" id="lang"></div>
</header>
<div class="fbar">
 <div class="frow" id="lensrow"></div>
 <div class="frow" id="catrow"></div>
</div>
<main>
 <div class="list" id="list"></div>
 <div class="mapwrap"><div id="webmap"></div></div>
</main>
<div class="overlay" id="overlay" onclick="if(event.target===this)kfm.close()"><div class="modal" id="modal"></div></div>
<script>
(function(){
window.openLink=function(u){window.open(u,'_blank');};
var K=window.KFM,SP=K.SP,purl=K.purl,UI=K.UI,FIL=K.FIL,DIFF=K.DIFF,AREA=K.AREA,CAT=K.CAT,HYPE=K.HYPE,LENS=K.LENS,R=K.R;
var CATPIC={bbq:'galbi',noodle:'noodle',chicken:'chicken',stew:'soup',street:'streetfood',cafe:'cafe',vegan:'salad'};
var PICOVR={r5:'bibimbap',r6:'ramen',r7:'coldnoodle',r8:'beer',r9:'chicken',r11:'cookie',r12:'dessert',s2:'dessert',s4:'cookie',s7:'salad',s10:'dessert',s11:'food',g3:'noodle',g5:'beer',g8:'dessert',g9:'food',g12:'cookie',i3:'streetfood',i5:'beer',i9:'food',i11:'food',i13:'beer',i14:'food',m6:'streetfood',m9:'food',m13:'bingsu',m14:'coldnoodle',hc1:'cookie',hc2:'cookie',hc3:'dessert',hc4:'dessert',hc5:'bingsu',hc6:'bingsu'};
function picFor(r){return 'img/'+(PICOVR[r.id]||CATPIC[r.catId]||'food')+'.jpg';}
function hpic(hy){var m={'ti-cookie':'cookie','ti-candy':'dessert','ti-ice-cream':'bingsu'};return 'img/'+(m[hy.ic]||'dessert')+'.jpg';}
var L_lang='en',area='hongdae',flt={type:'all',id:null},sel=null,saved={},wmap=null,markers={};
function T(o){return o==null?'':(typeof o==='string'?o:(o[L_lang]!=null?o[L_lang]:o.en));}
function nm(r){return L_lang==='ko'?r.ko:r.name;}
function nsub(r){return (L_lang==='ko'?r.name:r.ko)+' · '+T(r.cat)+' · '+r.price;}
function aName(r){var a=AREA.filter(function(x){return x.id===r.areaId;})[0];return a?T(a.t):'';}
function curArea(){return AREA.filter(function(a){return a.id===area;})[0];}
function dots(n){var s='';for(var i=1;i<=5;i++)s+='<span style="width:9px;height:9px;border-radius:50%;display:inline-block;background:'+(i<=n?SP[n]:'#E2E0D8')+';"></span>';return s;}
function areaList(){return Object.keys(R).map(function(k){return R[k];}).filter(function(r){return r.areaId===area;});}
function lensCount(id){return areaList().filter(function(r){return r.lenses.indexOf(id)>-1;}).length;}
function catCount(id){return areaList().filter(function(r){return r.catId===id;}).length;}
function listData(){
 if(flt.type==='hype')return HYPE[flt.id].ids.map(function(id){return R[id];}).filter(Boolean);
 var arr=areaList();
 if(flt.type==='cat')return arr.filter(function(r){return r.catId===flt.id;});
 if(flt.type==='lens')return arr.filter(function(r){return r.lenses.indexOf(flt.id)>-1;});
 return arr.sort(function(a,b){return b.trend-a.trend;});
}
window.kfm={
 setLang:function(l){L_lang=l;renderAll();},
 setArea:function(a){area=a;flt={type:'all',id:null};sel=null;if(wmap){wmap.setView(curArea().c,curArea().z);}renderAll();},
 setFilter:function(type,id){flt={type:type,id:id};sel=null;renderAll();},
 hype:function(i){flt={type:'hype',id:i};sel=null;renderAll();},
 save:function(id,e){if(e)e.stopPropagation();saved[id]?delete saved[id]:saved[id]=1;renderList();if(document.getElementById('overlay').classList.contains('show'))openDetail(id);},
 select:function(id){sel=id;renderList();if(wmap&&markers[id]){wmap.panTo([R[id].lat,R[id].lng]);}updatePins();},
 open:function(id){openDetail(id);},close:function(){document.getElementById('overlay').classList.remove('show');},
 maps:function(id){openLink('https://www.google.com/maps/search/?api=1&query='+R[id].lat+','+R[id].lng);}
};
function rcard(r){var sv=saved[r.id];
 return '<div class="rcard'+(sel===r.id?' sel':'')+'" onclick="kfm.open(\''+r.id+'\')" onmouseenter="kfm.select(\''+r.id+'\')">'
 +'<div class="ph" style="width:74px;height:74px;flex:0 0 auto;border-radius:11px;"><div class="ico"><i class="ti '+r.i+'" style="font-size:26px;"></i></div><img src="'+picFor(r)+'" loading="lazy" onerror="this.style.display=\'none\'"></div>'
 +'<div style="flex:1;min-width:0;"><div style="font-size:15px;font-weight:500;">'+nm(r)+'</div>'
 +'<div style="font-size:12px;color:var(--gray);margin:1px 0 7px;">'+nsub(r)+'</div>'
 +'<div style="display:flex;gap:5px;flex-wrap:wrap;">'
 +'<span class="pill" style="background:'+SP[r.spice]+'22;color:'+SP[r.spice]+';"><i class="ti ti-flame" style="font-size:11px;"></i>'+r.spice+'/5</span>'
 +(r.solo?'<span class="pill" style="background:var(--teal50);color:var(--teal);">'+T(UI.solo)+'</span>':'')
 +(r.halal?'<span class="pill" style="background:#EAF3DE;color:#3B6D11;">'+T(UI.halal)+'</span>':'')
 +(r.open?'<span class="pill" style="background:var(--blue50);color:var(--blue);">'+T(UI.open)+'</span>':'<span class="pill" style="background:#F2F1ED;color:#999;">'+T(UI.closed)+'</span>')
 +'</div></div>'
 +'<button class="kbtn" onclick="kfm.save(\''+r.id+'\',event)" aria-label="save" style="background:transparent;width:34px;height:34px;flex:0 0 auto;color:'+(sv?'var(--pri)':'#c8c5bc')+';font-size:22px;"><i class="ti ti-bookmark"></i></button></div>';
}
function renderHeader(){
 document.getElementById('appnm').textContent=T(UI.app);
 document.getElementById('tagline').textContent=T(UI.tagline);
 document.getElementById('areasel').innerHTML=AREA.map(function(a){return '<option value="'+a.id+'"'+(a.id===area?' selected':'')+'>'+T(a.t)+'</option>';}).join('');
 document.getElementById('lang').innerHTML='<span class="'+(L_lang==='en'?'on':'')+'" onclick="kfm.setLang(\'en\')">EN</span><span class="'+(L_lang==='ko'?'on':'')+'" onclick="kfm.setLang(\'ko\')">KO</span>';
}
function renderFilters(){
 var lr='<span class="flbl">'+T(UI.local)+'</span>';
 LENS.forEach(function(le){if(lensCount(le.id)===0)return;var on=flt.type==='lens'&&flt.id===le.id;lr+='<span class="chip lens'+(on?' on':'')+'" onclick="kfm.setFilter(\'lens\',\''+le.id+'\')"><i class="ti '+le.i+'" style="font-size:13px;"></i>'+T(le.t)+(le.kw?' · '+le.kw:'')+'</span>';});
 document.getElementById('lensrow').innerHTML=lr;
 var cr='<span class="flbl">'+T(UI.browse)+'</span>';
 CAT.forEach(function(c){if(c.id!=='all'&&catCount(c.id)===0)return;var on=(c.id==='all'&&flt.type==='all')||(flt.type==='cat'&&flt.id===c.id);cr+='<span class="chip'+(on?' on':'')+'" onclick="kfm.setFilter(\''+(c.id==='all'?'all':'cat')+'\',\''+c.id+'\')">'+(c.i?'<i class="ti '+c.i+'" style="font-size:13px;"></i>':'')+T(c.t)+'</span>';});
 document.getElementById('catrow').innerHTML=cr;
}
function renderList(){
 var data=listData();
 var h='<div class="sect" style="margin-bottom:8px;color:var(--pri);">'+T(UI.hype)+'</div><div class="hstrip">';
 HYPE.forEach(function(hy,i){h+='<div class="hcard" onclick="kfm.hype('+i+')" style="cursor:pointer;border-color:'+((flt.type==='hype'&&flt.id===i)?'var(--pri)':'var(--line)')+';"><div class="ph"><div class="ico" style="background:#2A2A33;color:#F5A623;"><i class="ti '+hy.ic+'" style="font-size:26px;"></i></div><img src="'+hpic(hy)+'" loading="lazy" onerror="this.style.display=\'none\'"><span style="position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.55);color:#fff;font-size:9px;padding:2px 6px;border-radius:12px;z-index:2;"><i class="ti ti-eye" style="font-size:10px;"></i> '+hy.v+'</span></div><div class="cap"><div style="font-size:12px;font-weight:500;line-height:1.25;">'+T(hy.t)+'</div></div></div>';});
 h+='</div>';
 h+='<div style="font-size:13px;color:var(--gray);margin:4px 2px 12px;">'+data.length+' '+T(UI.results)+' · '+(flt.type==='hype'?T(HYPE[flt.id].t):T(curArea().t))+'</div>';
 if(!data.length)h+='<div style="padding:30px;text-align:center;color:var(--gray);font-size:13px;">'+T(UI.none)+'</div>';
 data.forEach(function(r){h+=rcard(r);});
 document.getElementById('list').innerHTML=h;
}
function pinIcon(r){return L.divIcon({className:'',html:'<div class="kfm-pin'+(sel===r.id?' sel':'')+'"><i class="ti '+r.i+'" style="font-size:17px;"></i></div>',iconSize:[36,36],iconAnchor:[18,32]});}
function renderMap(){
 if(!window.L)return;
 var el=document.getElementById('webmap');if(!el)return;
 if(!wmap){wmap=L.map(el,{zoomControl:true,attributionControl:false}).setView(curArea().c,curArea().z);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(wmap);}
 Object.keys(markers).forEach(function(id){wmap.removeLayer(markers[id]);});markers={};
 var data=listData(),pts=[];
 data.forEach(function(r){var mk=L.marker([r.lat,r.lng],{icon:pinIcon(r)}).on('click',function(){kfm.open(r.id);});mk.addTo(wmap);markers[r.id]=mk;pts.push([r.lat,r.lng]);});
 if(pts.length>1)wmap.fitBounds(pts,{padding:[50,50],maxZoom:16});else if(pts.length===1)wmap.setView(pts[0],15);else wmap.setView(curArea().c,curArea().z);
}
function updatePins(){Object.keys(markers).forEach(function(id){markers[id].setIcon(pinIcon(R[id]));});}
function openDetail(id){var r=R[id],sv=saved[id];
 function sec(la,bo){return '<div style="margin-bottom:18px;"><div class="sect">'+la+'</div>'+bo+'</div>';}
 var h='<div class="x" onclick="kfm.close()"><i class="ti ti-x"></i></div>';
 h+='<div class="ph" style="height:230px;border-radius:18px 18px 0 0;"><div class="ico"><i class="ti '+r.i+'" style="font-size:60px;"></i></div><img src="'+picFor(r)+'" onerror="this.style.display=\'none\'">'
 +'<button class="kbtn" onclick="kfm.save(\''+id+'\',event)" aria-label="save" style="position:absolute;top:12px;right:14px;z-index:3;width:44px;height:44px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;color:'+(sv?'var(--pri)':'#b9b6ad')+';font-size:23px;box-shadow:0 1px 4px rgba(0,0,0,.2);"><i class="ti ti-bookmark"></i></button></div>';
 h+='<div style="padding:18px 20px;"><div style="font-size:23px;font-weight:500;">'+nm(r)+'</div><div style="font-size:13px;color:var(--gray);margin:3px 0 14px;">'+nsub(r)+' · '+aName(r)+'</div>';
 h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;">'
 +'<span class="pill" style="background:'+SP[r.spice]+'22;color:'+SP[r.spice]+';"><i class="ti ti-flame" style="font-size:12px;"></i>'+T(UI.spice)+' '+r.spice+'/5</span>'
 +(r.solo?'<span class="pill" style="background:var(--teal50);color:var(--teal);"><i class="ti ti-user" style="font-size:12px;"></i>'+T(UI.solo)+'</span>':'')
 +(r.halal?'<span class="pill" style="background:#EAF3DE;color:#3B6D11;"><i class="ti ti-moon" style="font-size:12px;"></i>'+T(UI.halal)+'</span>':'')
 +'<span class="pill" style="background:var(--pri50);color:var(--prid);">'+T(DIFF[r.diff])+'</span>'
 +(r.open?'<span class="pill" style="background:var(--blue50);color:var(--blue);">'+T(UI.open)+'</span>':'<span class="pill" style="background:#F2F1ED;color:#999;">'+T(UI.closed)+'</span>')+'</div>';
 h+=sec(T(UI.why),'<div style="font-size:14.5px;color:var(--ink2);line-height:1.65;">'+T(r.why)+'</div>');
 h+=sec(T(UI.ctx),'<div style="font-size:14.5px;color:var(--ink2);line-height:1.65;">'+T(r.ctx)+'</div>');
 h+=sec(T(UI.spice),'<div style="display:flex;gap:6px;align-items:center;">'+dots(r.spice)+'<span style="font-size:12px;color:var(--gray);margin-left:4px;">'+T(UI.spiceW)[r.spice]+'</span></div>');
 var mn='';r.menu.forEach(function(m){mn+='<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);"><div><div style="font-size:14px;">'+(L_lang==='ko'?m.ko:m.n)+'</div><div style="font-size:11px;color:var(--gray);">'+(L_lang==='ko'?m.n:m.ko)+'</div></div><div style="font-size:13px;color:var(--ink2);">'+m.p+'</div></div>';});
 h+=sec(T(UI.menu),mn);
 var nr='';r.near.forEach(function(n){nr+='<span class="pill" style="background:#fff;border:1px solid var(--line);color:#666;margin:0 6px 6px 0;"><i class="ti ti-walk" style="font-size:12px;"></i>'+T(n.t)+' · '+n.m+'m</span>';});
 h+=sec(T(UI.near),'<div style="display:flex;flex-wrap:wrap;">'+nr+'</div>');
 h+='<button class="kbtn" onclick="kfm.maps(\''+id+'\')" style="width:100%;background:var(--pri);color:#fff;font-size:15px;font-weight:500;padding:14px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px;"><i class="ti ti-brand-google-maps" style="font-size:18px;"></i>'+T(UI.maps)+'</button>';
 h+='</div>';
 document.getElementById('modal').innerHTML=h;
 document.getElementById('overlay').classList.add('show');
}
function renderAll(){renderHeader();renderFilters();renderList();renderMap();}
renderAll();
})();
</script>
</body>
</html>
